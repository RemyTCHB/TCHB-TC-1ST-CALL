<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TC Checklist</title>
    <!-- Updated to SVG Icon -->
    <link rel="icon" type="image/svg+xml" href="https://raw.githubusercontent.com/RemyTCHB/TCHB-INVESTOR-NETWORK-PORTAL/main/icon.svg">
    
    <!-- Google Fonts for Premium Look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        tchb: {
                            blue: '#36347A',
                            red: '#D32027',
                            green: '#00A859',
                            dark: '#1E1E24',
                            light: '#F8FAFC'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Modernized Custom Checkbox styling */
        .check-container {
            display: flex;
            align-items: flex-start;
            margin-bottom: 0.5rem;
            cursor: pointer;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }
        .check-container:hover {
            background-color: #f1f5f9;
            border-color: #e2e8f0;
        }
        
        /* Hide default checkbox */
        .check-container input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        /* Create a custom checkbox */
        .checkmark {
            margin-top: 0.2rem;
            height: 1.5rem;
            width: 1.5rem;
            background-color: #fff;
            border: 2px solid #cbd5e1;
            border-radius: 0.375rem;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s ease;
        }

        /* On hover, add a subtle border color */
        .check-container:hover input ~ .checkmark {
            border-color: #94a3b8;
        }

        /* When checked, add TCHB red background */
        .check-container input:checked ~ .checkmark {
            background-color: #D32027;
            border-color: #D32027;
        }

        /* Create the checkmark/indicator (hidden when not checked) */
        .checkmark:after {
            content: "";
            display: none;
            width: 0.4rem;
            height: 0.8rem;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
            margin-bottom: 0.15rem;
        }

        /* Show the checkmark when checked */
        .check-container input:checked ~ .checkmark:after {
            display: block;
        }

        .check-text {
            margin-left: 1rem;
            color: #334155;
            font-size: 1.05rem;
            line-height: 1.5;
            font-weight: 400;
            transition: all 0.2s ease;
        }
        
        .check-container input:checked ~ .check-text {
            color: #94a3b8;
            text-decoration: line-through;
        }
        
        .nested-1 { margin-left: 2.5rem; }
        .nested-2 { margin-left: 5rem; }
        
        /* Accordion transition & Styling */
        .accordion-content {
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease-in-out;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
        }
        .accordion-content.open {
            max-height: 2500px;
            opacity: 1;
        }

        /* Smooth scroll behavior */
        html {
            scroll-behavior: smooth;
        }

        /* Print Styles */
        @media print {
            body { background-color: white !important; }
            .no-print { display: none !important; }
            .accordion-content { max-height: none !important; opacity: 1 !important; display: block !important; padding: 1rem 0 !important; }
            .accordion-header i { display: none !important; }
            .accordion-header { break-after: avoid; background-color: #36347A !important; color: white !important; border: 1px solid #36347A; }
            .bg-white { box-shadow: none !important; border: none !important; margin-bottom: 1rem !important; }
            .check-container { padding: 0.25rem 0 !important; margin-bottom: 0 !important; }
            input[type="text"], input[type="url"] { border: none !important; padding: 0 !important; font-weight: bold; color: #000; }
            .question-answer { background: transparent !important; border-bottom: 1px dashed #cbd5e1 !important; border-radius: 0 !important; box-shadow: none !important; }
        }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 antialiased selection:bg-tchb-red selection:text-white pb-20">

    <!-- Header with Glassmorphism -->
    <header class="bg-white/90 backdrop-blur-md shadow-sm sticky top-0 z-50 border-b-[3px] border-tchb-red no-print transition-all duration-300">
        <div class="max-w-5xl mx-auto px-6 py-4 flex flex-col sm:flex-row items-center justify-between">
            <div class="flex items-center gap-4">
                <img src="https://raw.githubusercontent.com/RemyTCHB/TCHB-INVESTOR-NETWORK-PORTAL/main/logo.svg" alt="Total Cash Home Buyers" class="h-10 sm:h-12 object-contain" onerror="this.src='https://placehold.co/400x100/36347A/FFF?text=TOTAL+CASH+HOME+BUYERS'">
            </div>
            <div class="mt-4 sm:mt-0 flex flex-col sm:items-end items-center">
                <h1 class="text-xl font-bold text-tchb-blue tracking-tight">TC Checklist</h1>
                <div class="flex items-center mt-1">
                    <span class="flex h-2.5 w-2.5 relative mr-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-tchb-red opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-tchb-red"></span>
                    </span>
                    <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider">TC First Call</p>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-5xl mx-auto px-4 sm:px-6 py-8">
        
        <!-- Property Context / Session Manager -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 mb-8">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-tchb-blue flex items-center">
                    <i class="fa-solid fa-map-pin mr-2 text-tchb-red"></i> Property Context
                </h2>
                <div class="flex items-center gap-3 no-print">
                    <span id="save-status" class="text-xs font-semibold px-2 py-1 bg-slate-100 text-slate-500 rounded-md transition-colors">Waiting for address...</span>
                    <button onclick="openManageModal()" class="text-xs font-semibold px-3 py-1.5 bg-slate-800 text-white rounded-md hover:bg-slate-700 transition-colors flex items-center shadow-sm">
                        <i class="fa-solid fa-list-check mr-1.5"></i> Manage Saved
                    </button>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                    <label for="property-address" class="block text-sm font-semibold text-slate-700 mb-1">Property Address</label>
                    <input type="text" id="property-address" list="saved-addresses" placeholder="e.g. 123 Main St, Miami FL..." class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-tchb-red focus:border-tchb-red outline-none transition placeholder-slate-400">
                    <datalist id="saved-addresses"></datalist>
                </div>
                <div>
                    <label for="crm-link" class="block text-sm font-semibold text-slate-700 mb-1">CRM Lead Link</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fa-solid fa-link text-slate-400"></i>
                        </div>
                        <input type="url" id="crm-link" placeholder="https://app.gohighlevel.com/..." class="w-full pl-10 pr-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-tchb-red focus:border-tchb-red outline-none transition placeholder-slate-400">
                    </div>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="flex flex-wrap gap-3 mb-6 justify-end no-print">
            <button onclick="window.printChecklist()" class="px-5 py-2.5 bg-white border border-slate-200 hover:border-slate-300 hover:bg-slate-50 text-slate-700 text-sm font-semibold rounded-lg shadow-sm transition-all flex items-center">
                <i class="fa-solid fa-print mr-2 text-slate-400"></i>Print / PDF
            </button>
            <button onclick="toggleAll(true)" class="px-5 py-2.5 bg-white border border-slate-200 hover:border-slate-300 hover:bg-slate-50 text-slate-700 text-sm font-semibold rounded-lg shadow-sm transition-all flex items-center">
                <i class="fa-solid fa-folder-open mr-2 text-tchb-blue"></i>Expand All
            </button>
            <button onclick="toggleAll(false)" class="px-5 py-2.5 bg-white border border-slate-200 hover:border-slate-300 hover:bg-slate-50 text-slate-700 text-sm font-semibold rounded-lg shadow-sm transition-all flex items-center">
                <i class="fa-solid fa-folder-closed mr-2 text-slate-400"></i>Collapse All
            </button>
            <button onclick="resetChecklist()" class="px-5 py-2.5 bg-tchb-red hover:bg-red-700 text-white text-sm font-semibold rounded-lg shadow-sm transition-all flex items-center ml-2">
                <i class="fa-solid fa-rotate-right mr-2"></i>Reset Call
            </button>
        </div>

        <!-- Checklist Sections -->
        <div class="space-y-5" id="checklist-container">

            <!-- Mortgage Questions -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden group">
                <button class="accordion-header w-full px-6 py-5 flex justify-between items-center bg-tchb-blue hover:bg-[#2c2a63] transition-colors" onclick="toggleAccordion(this)">
                    <div class="flex items-center">
                        <div class="w-10 h-10 rounded-lg bg-white/20 flex items-center justify-center mr-4 text-white">
                            <i class="fa-solid fa-building-columns text-lg"></i>
                        </div>
                        <h2 class="text-lg font-bold text-white tracking-wide">Mortgage Questions</h2>
                    </div>
                    <i class="fa-solid fa-chevron-down text-white transform transition-transform duration-300"></i>
                </button>
                <div class="accordion-content open border-t border-slate-100 bg-white px-6 py-4">
                    <label class="check-container">
                        <input type="checkbox" class="checklist-cb">
                        <span class="checkmark"></span>
                        <span class="check-text">Mtg Company ?</span>
                    </label>
                    <label class="check-container">
                        <input type="checkbox" class="checklist-cb">
                        <span class="checkmark"></span>
                        <span class="check-text">Total Principle Owed / Total Payoff ?</span>
                    </label>
                    <label class="check-container">
                        <input type="checkbox" class="checklist-cb">
                        <span class="checkmark"></span>
                        <span class="check-text">Is Property In Pre Foreclosure? Any Red Flags Like This ?</span>
                    </label>
                    <label class="check-container">
                        <input type="checkbox" class="checklist-cb">
                        <span class="checkmark"></span>
                        <span class="check-text">Was There Any Late Payments?</span>
                    </label>
                </div>
            </div>

            <!-- Pictures -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden group">
                <button class="accordion-header w-full px-6 py-5 flex justify-between items-center bg-tchb-blue hover:bg-[#2c2a63] transition-colors" onclick="toggleAccordion(this)">
                    <div class="flex items-center">
                        <div class="w-10 h-10 rounded-lg bg-white/20 flex items-center justify-center mr-4 text-white">
                            <i class="fa-solid fa-camera text-lg"></i>
                        </div>
                        <h2 class="text-lg font-bold text-white tracking-wide">Pictures</h2>
                    </div>
                    <i class="fa-solid fa-chevron-down text-white transform transition-transform duration-300"></i>
                </button>
                <div class="accordion-content border-t border-slate-100 bg-white px-6 py-4">
                    <label class="check-container">
                        <input type="checkbox" class="checklist-cb">
                        <span class="checkmark"></span>
                        <span class="check-text">Sending Photos Any Current Photos From Seller ?</span>
                    </label>
                </div>
            </div>

            <!-- Emergency Contact Info -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden group">
                <button class="accordion-header w-full px-6 py-5 flex justify-between items-center bg-tchb-blue hover:bg-[#2c2a63] transition-colors" onclick="toggleAccordion(this)">
                    <div class="flex items-center">
                        <div class="w-10 h-10 rounded-lg bg-white/20 flex items-center justify-center mr-4 text-white">
                            <i class="fa-solid fa-address-book text-lg"></i>
                        </div>
                        <h2 class="text-lg font-bold text-white tracking-wide">Emergency Contact Info</h2>
                    </div>
                    <i class="fa-solid fa-chevron-down text-white transform transition-transform duration-300"></i>
                </button>
                <div class="accordion-content border-t border-slate-100 bg-white px-6 py-4">
                    <label class="check-container">
                        <input type="checkbox" class="checklist-cb">
                        <span class="checkmark"></span>
                        <span class="check-text">Who Is The Emergency Contact? Best Phone Number/ Best Way To Communicate With This Person? ( Call Or Text, Etc.)</span>
                    </label>
                </div>
            </div>

            <!-- HOA Questions -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden group">
                <button class="accordion-header w-full px-6 py-5 flex justify-between items-center bg-tchb-blue hover:bg-[#2c2a63] transition-colors" onclick="toggleAccordion(this)">
                    <div class="flex items-center">
                        <div class="w-10 h-10 rounded-lg bg-white/20 flex items-center justify-center mr-4 text-white">
                            <i class="fa-solid fa-users text-lg"></i>
                        </div>
                        <h2 class="text-lg font-bold text-white tracking-wide">HOA Questions</h2>
                    </div>
                    <i class="fa-solid fa-chevron-down text-white transform transition-transform duration-300"></i>
                </button>
                <div class="accordion-content border-t border-slate-100 bg-white px-6 py-4">
                    <label class="check-container">
                        <input type="checkbox" class="checklist-cb">
                        <span class="checkmark"></span>
                        <span class="check-text">Whats HOA Contact Info?</span>
                    </label>
                    <label class="check-container">
                        <input type="checkbox" class="checklist-cb">
                        <span class="checkmark"></span>
                        <span class="check-text">Best Way To Communicate</span>
                    </label>
                    <label class="check-container">
                        <input type="checkbox" class="checklist-cb">
                        <span class="checkmark"></span>
                        <span class="check-text">Start Ordering The HOA Approval Process At Least Understand Timeline For Process?</span>
                    </label>
                    <label class="check-container">
                        <input type="checkbox" class="checklist-cb">
                        <span class="checkmark"></span>
                        <span class="check-text">How Does One Apply?</span>
                    </label>
                    <label class="check-container">
                        <input type="checkbox" class="checklist-cb">
                        <span class="checkmark"></span>
                        <span class="check-text">Any Upcoming Special Assessments That We Know About Coming Up ? (Maybe Get HOA Contact And Communicate/ Verify Info With Them Directly)</span>
                    </label>
                    <label class="check-container nested-1">
                        <input type="checkbox" class="checklist-cb">
                        <span class="checkmark"></span>
                        <span class="check-text">If So, What Is It For? What Is The Amount? When Will It Be Added To The Bill? Make Sure Sellers Understand THEY’RE Paying It (Discuss Potential Options For Them To Handle Special Assessment, Ie. Money In Escrow, Money Out At Closing, Or Doing A Price Reduction For The Special Assessment Amount Needs To Be Put In Writing Whatever Agreed Upon)</span>
                    </label>
                    <label class="check-container">
                        <input type="checkbox" class="checklist-cb">
                        <span class="checkmark"></span>
                        <span class="check-text">HOA Monthly/ Yearly Amount?</span>
                    </label>
                    <label class="check-container nested-1">
                        <input type="checkbox" class="checklist-cb">
                        <span class="checkmark"></span>
                        <span class="check-text">When Paid</span>
                    </label>
                    <label class="check-container">
                        <input type="checkbox" class="checklist-cb">
                        <span class="checkmark"></span>
                        <span class="check-text">HOA Rental Restrictions ? (Ie No STR / Only A Certain % Of Units In Building Can Be Rented Have We Reached That Percentage)</span>
                    </label>
                    <label class="check-container">
                        <input type="checkbox" class="checklist-cb">
                        <span class="checkmark"></span>
                        <span class="check-text">Can Buyers Be Under An LLC/ Biz Entity Or Must It Be Under A Personal Name ?</span>
                    </label>
                </div>
            </div>

            <!-- SFHs -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden group">
                <button class="accordion-header w-full px-6 py-5 flex justify-between items-center bg-tchb-blue hover:bg-[#2c2a63] transition-colors" onclick="toggleAccordion(this)">
                    <div class="flex items-center">
                        <div class="w-10 h-10 rounded-lg bg-white/20 flex items-center justify-center mr-4 text-white">
                            <i class="fa-solid fa-house text-lg"></i>
                        </div>
                        <h2 class="text-lg font-bold text-white tracking-wide">SFHs</h2>
                    </div>
                    <i class="fa-solid fa-chevron-down text-white transform transition-transform duration-300"></i>
                </button>
                <div class="accordion-content border-t border-slate-100 bg-white px-6 py-4">
                    <label class="check-container">
                        <input type="checkbox" class="checklist-cb">
                        <span class="checkmark"></span>
                        <span class="check-text">How Long Big Ticket Items Fully Replaced And Or Serviced/Maintained? ( HVAC, Electrical, Plumbing, Roof)</span>
                    </label>
                    <label class="check-container">
                        <input type="checkbox" class="checklist-cb">
                        <span class="checkmark"></span>
                        <span class="check-text">Occupancy? (Vacant Or Occupied Who Lives In The Home? )</span>
                    </label>
                    <label class="check-container nested-1">
                        <input type="checkbox" class="checklist-cb">
                        <span class="checkmark"></span>
                        <span class="check-text">Owner Occupied</span>
                    </label>
                    <label class="check-container nested-1">
                        <input type="checkbox" class="checklist-cb">
                        <span class="checkmark"></span>
                        <span class="check-text">Tenant Occupied? If Yes What Type Of Lease (Yearly Or Month To Month)? How Much Is Rents?</span>
                    </label>
                    <label class="check-container nested-2">
                        <input type="checkbox" class="checklist-cb">
                        <span class="checkmark"></span>
                        <span class="check-text">If Section 8? How Much Does Section 8 Pay/ Mo? How Much Does The Tenant Pay?</span>
                    </label>
                    <label class="check-container">
                        <input type="checkbox" class="checklist-cb">
                        <span class="checkmark"></span>
                        <span class="check-text">Confirm Bdr/Bth And Living Square Footage (Heated Square Footage) ?</span>
                    </label>
                    <label class="check-container">
                        <input type="checkbox" class="checklist-cb">
                        <span class="checkmark"></span>
                        <span class="check-text">Construction Of House? ( Check Local County Property Appraiser Site, Ie. Block, Wood Frame, Etc? )</span>
                    </label>
                    <label class="check-container">
                        <input type="checkbox" class="checklist-cb">
                        <span class="checkmark"></span>
                        <span class="check-text">Year Built</span>
                    </label>
                    <label class="check-container">
                        <input type="checkbox" class="checklist-cb">
                        <span class="checkmark"></span>
                        <span class="check-text">Utilities ( City Water And Sewer Or Well And Septic? If Well/Septic Most Recent Maintenance Done And/Or When Last Replaced)</span>
                    </label>
                    <label class="check-container">
                        <input type="checkbox" class="checklist-cb">
                        <span class="checkmark"></span>
                        <span class="check-text">Confirm Lot Size? Lot Dimensions ?</span>
                    </label>
                    <label class="check-container">
                        <input type="checkbox" class="checklist-cb">
                        <span class="checkmark"></span>
                        <span class="check-text">Confirm Floodzone Code (And What Code Means No Flood Zone, Minimal Flood, Etc)</span>
                    </label>
                    <label class="check-container">
                        <input type="checkbox" class="checklist-cb">
                        <span class="checkmark"></span>
                        <span class="check-text">Confirm Residential Zoning Code ( And What It Means)</span>
                    </label>
                    <label class="check-container">
                        <input type="checkbox" class="checklist-cb">
                        <span class="checkmark"></span>
                        <span class="check-text">Confirm If Pool Or No Pool</span>
                    </label>
                    <label class="check-container">
                        <input type="checkbox" class="checklist-cb">
                        <span class="checkmark"></span>
                        <span class="check-text">Parking Type?</span>
                    </label>
                    <label class="check-container nested-1">
                        <input type="checkbox" class="checklist-cb">
                        <span class="checkmark"></span>
                        <span class="check-text">If Garage , Type? ( How Many Cars / Attached Or Detached)</span>
                    </label>
                    <label class="check-container">
                        <input type="checkbox" class="checklist-cb">
                        <span class="checkmark"></span>
                        <span class="check-text">Is Prop. In Historic Zone?</span>
                    </label>
                    <label class="check-container">
                        <input type="checkbox" class="checklist-cb">
                        <span class="checkmark"></span>
                        <span class="check-text">School Zoning? (Elementary, Middle, High)</span>
                    </label>
                </div>
            </div>

            <!-- Land -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden group">
                <button class="accordion-header w-full px-6 py-5 flex justify-between items-center bg-tchb-blue hover:bg-[#2c2a63] transition-colors" onclick="toggleAccordion(this)">
                    <div class="flex items-center">
                        <div class="w-10 h-10 rounded-lg bg-white/20 flex items-center justify-center mr-4 text-white">
                            <i class="fa-solid fa-map-location-dot text-lg"></i>
                        </div>
                        <h2 class="text-lg font-bold text-white tracking-wide">Land</h2>
                    </div>
                    <i class="fa-solid fa-chevron-down text-white transform transition-transform duration-300"></i>
                </button>
                <div class="accordion-content border-t border-slate-100 bg-white px-6 py-4">
                    <label class="check-container">
                        <input type="checkbox" class="checklist-cb">
                        <span class="checkmark"></span>
                        <span class="check-text">Confirm Lot Square Footage</span>
                    </label>
                    <label class="check-container">
                        <input type="checkbox" class="checklist-cb">
                        <span class="checkmark"></span>
                        <span class="check-text">Confirm Lot Dimensions (Dispo Can Confirm)</span>
                    </label>
                    <label class="check-container">
                        <input type="checkbox" class="checklist-cb">
                        <span class="checkmark"></span>
                        <span class="check-text">Confirm Residential Zoning Code ( And What It Means)</span>
                    </label>
                    <label class="check-container">
                        <input type="checkbox" class="checklist-cb">
                        <span class="checkmark"></span>
                        <span class="check-text">Confirm Flood Zone Code (And What Code Means No Flood Zone, Minimal Flood, Etc )</span>
                    </label>
                    <label class="check-container">
                        <input type="checkbox" class="checklist-cb">
                        <span class="checkmark"></span>
                        <span class="check-text">Has There Ever Been A Property On The Lot? If So When Was It Demolished?</span>
                    </label>
                    <label class="check-container">
                        <input type="checkbox" class="checklist-cb">
                        <span class="checkmark"></span>
                        <span class="check-text">Have Impact Fees Been Paid ? If So How Much Were They?</span>
                    </label>
                    <label class="check-container">
                        <input type="checkbox" class="checklist-cb">
                        <span class="checkmark"></span>
                        <span class="check-text">Are There Utilities On The Lot Or On The Road Passing In Front Of Lot? Or How Far Away Are The Utilities From Lot?</span>
                    </label>
                    <label class="check-container nested-1">
                        <input type="checkbox" class="checklist-cb">
                        <span class="checkmark"></span>

                    <label class="check-container">

                    <label class="check-container">

                    <label class="check-container">

    <!-- Footer -->
    <footer class="max-w-5xl mx-auto px-4 mt-8 pb-10 text-center text-slate-400 font-medium text-sm no-print border-t border-slate-200 pt-8">

    </footer>

    <!-- Manage Addresses Modal -->
    <div id="manage-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4 opacity-0 transition-opacity duration-300 no-print">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-lg overflow-hidden transform scale-95 transition-transform duration-300">
            <div class="flex justify-between items-center p-5 border-b border-slate-100 bg-slate-50">
                <h3 class="text-lg font-bold text-tchb-blue"><i class="fa-solid fa-box-archive mr-2"></i>Saved Checklists</h3>
                <button onclick="closeManageModal()" class="text-slate-400 hover:text-slate-600 transition-colors"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="p-2 max-h-[60vh] overflow-y-auto" id="saved-addresses-list">
                <!-- Populated by JS -->
            </div>
            <div class="p-4 border-t border-slate-100 bg-slate-50 flex justify-end">
                <button onclick="closeManageModal()" class="px-5 py-2.5 bg-slate-200 hover:bg-slate-300 text-slate-700 text-sm font-semibold rounded-lg transition-colors">Close</button>
            </div>
        </div>
    </div>

    <script>
        // --- Core UI Functionality ---
        document.getElementById('year').textContent = new Date().getFullYear();

        window.printChecklist = function() {
            toggleAll(true);
            setTimeout(() => { window.print(); }, 300); 
        };

        function toggleAccordion(button) {
            const content = button.nextElementSibling;
            const icon = button.querySelector('.fa-chevron-down');
            
            if (content.classList.contains('open')) {
                content.classList.remove('open');
                icon.style.transform = 'rotate(0deg)';
            } else {
                content.classList.add('open');
                icon.style.transform = 'rotate(180deg)';
                setTimeout(() => {
                    const y = button.getBoundingClientRect().top + window.pageYOffset - 100;
                    window.scrollTo({top: y, behavior: 'smooth'});
                }, 300);
            }
        }

        function toggleAll(expand) {
            const contents = document.querySelectorAll('.accordion-content');
            const icons = document.querySelectorAll('.accordion-header .fa-chevron-down');
            contents.forEach((content, index) => {
                if (expand) {
                    content.classList.add('open');
                    icons[index].style.transform = 'rotate(180deg)';
                } else {
                    content.classList.remove('open');
                    icons[index].style.transform = 'rotate(0deg)';
                }
            });
        }

        // --- Session Manager & Storage Logic ---
        const STORAGE_KEY = 'tchb_sessions_db';
        const addressInput = document.getElementById('property-address');
        const crmInput = document.getElementById('crm-link');
        const statusText = document.getElementById('save-status');
        const checkboxes = document.querySelectorAll('.checklist-cb');
        const datalist = document.getElementById('saved-addresses');

        function getDB() {
            return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
        }

        function saveDB(data) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            updateDatalist();
        }

        function updateDatalist() {
            const db = getDB();
            datalist.innerHTML = '';
            Object.keys(db).forEach(address => {
                if(address !== 'Unsaved Draft') {
                    const option = document.createElement('option');
                    option.value = address;
                    datalist.appendChild(option);
                }
            });
        }

        function showStatus(text, type = 'normal') {
            statusText.textContent = text;
            if(type === 'success') {
                statusText.className = "text-xs font-semibold px-2 py-1 bg-green-100 text-green-700 rounded-md transition-colors";
            } else {
                statusText.className = "text-xs font-semibold px-2 py-1 bg-slate-100 text-slate-500 rounded-md transition-colors";
            }
            setTimeout(() => {
                statusText.className = "text-xs font-semibold px-2 py-1 bg-slate-100 text-slate-500 rounded-md transition-colors";
            }, 2000);
        }

        function saveCurrentState() {
            const currentAddress = addressInput.value.trim() || 'Unsaved Draft';
            const db = getDB();
            
            const state = {
                crmLink: crmInput.value,
                checks: {},
                answers: {}
            };
            
            checkboxes.forEach((cb, index) => {
                state.checks['chk_' + index] = cb.checked;
            });

            document.querySelectorAll('.question-answer').forEach((input, index) => {
                state.answers['ans_' + index] = input.value;
            });

            // If they just typed an address but we had an "Unsaved Draft", migrate the draft!
            if (currentAddress !== 'Unsaved Draft' && db['Unsaved Draft']) {
                delete db['Unsaved Draft'];
            }

            db[currentAddress] = state;
            saveDB(db);
            showStatus('Auto-saved ✓', 'success');
        }

        function loadAddressState(address) {
            const db = getDB();
            const state = db[address];
            const answerInputs = document.querySelectorAll('.question-answer');
            
            if (state) {
                // Load existing state
                crmInput.value = state.crmLink || '';
                checkboxes.forEach((cb, index) => {
                    cb.checked = !!state.checks['chk_' + index];
                });
                answerInputs.forEach((input, index) => {
                    input.value = (state.answers && state.answers['ans_' + index]) ? state.answers['ans_' + index] : '';
                });
                showStatus(`Loaded: ${address}`, 'success');
            } else {
                // It's a brand new address, clear the boxes
                crmInput.value = '';
                checkboxes.forEach(cb => cb.checked = false);
                answerInputs.forEach(input => input.value = '');
                showStatus('New property started', 'success');
            }
        }

        function resetChecklist() {
            const currentAddress = addressInput.value.trim() || 'Unsaved Draft';
            if(confirm(`Are you sure you want to clear the checklist for ${currentAddress}?`)) {
                
                // Clear UI
                addressInput.value = '';
                crmInput.value = '';
                checkboxes.forEach(cb => cb.checked = false);
                document.querySelectorAll('.question-answer').forEach(input => input.value = '');
                toggleAll(false);
                
                // Open first section
                const firstContent = document.querySelector('.accordion-content');
                const firstIcon = document.querySelector('.accordion-header .fa-chevron-down');
                firstContent.classList.add('open');
                firstIcon.style.transform = 'rotate(180deg)';
                window.scrollTo({top: 0, behavior: 'smooth'});

                // Delete from DB
                const db = getDB();
                if(db[currentAddress]) {
                    delete db[currentAddress];
                    saveDB(db);
                }
                
                showStatus('Checklist reset');
            }
        }

        // --- Modal Management Logic ---
        function openManageModal() {
            const modal = document.getElementById('manage-modal');
            const listContainer = document.getElementById('saved-addresses-list');
            const db = getDB();
            
            listContainer.innerHTML = '';
            const addresses = Object.keys(db).filter(a => a !== 'Unsaved Draft');
            
            if (addresses.length === 0) {
                listContainer.innerHTML = '<p class="text-slate-500 text-center py-8 italic">No saved checklists found.</p>';
            } else {
                addresses.forEach(address => {
                    // Escape quotes to prevent HTML breaking
                    const safeAddress = address.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                    const item = document.createElement('div');
                    item.className = 'flex justify-between items-center p-3 m-2 hover:bg-slate-50 border border-transparent hover:border-slate-200 rounded-lg group transition-colors shadow-sm';
                    item.innerHTML = `
                        <span class="font-medium text-slate-700 truncate pr-4 flex-grow">${address}</span>
                        <div class="flex gap-1 flex-shrink-0">
                            <button onclick="loadFromModal('${safeAddress}')" class="p-2 text-slate-500 hover:text-tchb-blue hover:bg-blue-50 rounded-md transition-colors" title="Load this address">
                                <i class="fa-solid fa-folder-open"></i>
                            </button>
                            <button onclick="deleteAddress('${safeAddress}')" class="p-2 text-slate-500 hover:text-tchb-red hover:bg-red-50 rounded-md transition-colors" title="Delete this address">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </div>
                    `;
                    listContainer.appendChild(item);
                });
            }
            
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.querySelector('div').classList.remove('scale-95');
            }, 10);
        }

        function closeManageModal() {
            const modal = document.getElementById('manage-modal');
            modal.classList.add('opacity-0');
            modal.querySelector('div').classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        function loadFromModal(address) {
            addressInput.value = address;
            loadAddressState(address);
            closeManageModal();
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function deleteAddress(address) {
            if(confirm(`Are you sure you want to permanently delete the checklist for:\n"${address}"?`)) {
                const db = getDB();
                delete db[address];
                saveDB(db);
                
                // Clear screen if deleting the actively viewed address
                if(addressInput.value.trim() === address) {
                    addressInput.value = '';
                    crmInput.value = '';
                    checkboxes.forEach(cb => cb.checked = false);
                    document.querySelectorAll('.question-answer').forEach(input => input.value = '');
                    showStatus('Address deleted');
                }
                
                openManageModal(); // Refresh list immediately
            }
        }

        // --- Initialization & Event Listeners ---
        document.addEventListener('DOMContentLoaded', () => {
            // UI Accordion init
            const contents = document.querySelectorAll('.accordion-content');
            const icons = document.querySelectorAll('.accordion-header .fa-chevron-down');
            contents.forEach((content, index) => {
                if(index !== 0) {
                    content.classList.remove('open');
                    icons[index].style.transform = 'rotate(0deg)';
                } else {
                    icons[index].style.transform = 'rotate(180deg)';
                }
            });

            // Dynamically Inject Answer Fields under each question
            const checkContainers = document.querySelectorAll('.check-container');
            checkContainers.forEach((container, index) => {
                let marginBase = 3.5; // rem
                if (container.classList.contains('nested-1')) marginBase += 2.5;
                if (container.classList.contains('nested-2')) marginBase += 5;

                const input = document.createElement('input');
                input.type = 'text';
                input.className = 'question-answer block -mt-1 mb-4 bg-slate-50 border border-slate-200 hover:border-slate-300 focus:bg-white focus:border-tchb-blue focus:ring-1 focus:ring-tchb-blue px-3 py-1.5 text-sm outline-none transition-all text-slate-700 placeholder-slate-400 rounded-md shadow-sm';
                input.style.marginLeft = marginBase + 'rem';
                input.style.width = 'calc(100% - ' + (marginBase + 1) + 'rem)';
                input.placeholder = 'Add answer/notes...';
                
                container.parentNode.insertBefore(input, container.nextSibling);
            });

            // Populate Datalist
            updateDatalist();

            // Load Unsaved Draft if it exists
            const db = getDB();
            if (db['Unsaved Draft']) {
                loadAddressState('Unsaved Draft');
                showStatus('Unsaved draft recovered');
            }

            // Input Listeners
            addressInput.addEventListener('change', (e) => {
                const newAddress = e.target.value.trim();
                if (newAddress) {
                    loadAddressState(newAddress);
                    saveCurrentState(); // Force save to lock it in
                }
            });

            crmInput.addEventListener('input', () => {
                saveCurrentState();
            });

            checkboxes.forEach(cb => {
                cb.addEventListener('change', () => {
                    saveCurrentState();
                });
            });

            document.querySelectorAll('.question-answer').forEach(input => {
                input.addEventListener('input', () => {
                    saveCurrentState();
                });
            });
        });
    </script>
</body>
