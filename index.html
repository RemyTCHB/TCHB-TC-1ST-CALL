<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TC Checklist</title>
    
    <!-- PWA Manifest & Icons -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/RemyTCHB/TCHB-TC-1ST-CALL/d8876d6e5f95680a4c2760da336b32020f3ac881/icon.png">
    <meta name="theme-color" content="#0b0f19">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Google Fonts & Tailwind -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: {
                        brand: { 
                            purple: '#4f46e5', 
                            crimson: '#dc2626', 
                            emerald: '#10b981', 
                            gold: '#f59e0b', 
                            cyan: '#06b6d4', 
                            bgDark: '#0b0f19', 
                            cardBg: '#111827' 
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        body { background-color: #0b0f19; color: #f3f4f6; overflow-x: hidden; overflow-y: scroll; }
        body, a, button, input, select, textarea, [onclick], .cursor-pointer, .cursor-not-allowed, label { cursor: none !important; }
        
        @media (max-width: 768px) {
            body, a, button, input, select, textarea, [onclick], label { cursor: auto !important; }
            #cursor-dot, #cursor-ring, #mouseGlow { display: none !important; }
        }
        
        /* Cursor & Glow Effects */
        #mouseGlow {
            position: fixed; left: 0; top: 0; pointer-events: none; z-index: 1;
            width: 220px; height: 220px;
            transform: translate(calc(var(--mouse-x, 50vw) - 110px), calc(var(--mouse-y, 50vh) - 110px));
            opacity: 0; transition: opacity 0.5s ease; mix-blend-mode: screen;
        }
        #mouseGlow::before {
            content: ""; position: absolute; inset: 0; border-radius: 50%;
            background: radial-gradient(circle at center, transparent 15%, rgba(16, 185, 129, 0.25) 35%, rgba(79, 70, 229, 0.25) 60%, rgba(220, 38, 38, 0.25) 85%, transparent 100%);
            filter: blur(16px); opacity: 0.7; animation: color-cycle 5s linear infinite;
        }
        @keyframes color-cycle { 0% { filter: blur(16px) hue-rotate(0deg); } 100% { filter: blur(16px) hue-rotate(360deg); } }
        
        #cursor-dot { position: fixed; top: 0; left: 0; width: 6px; height: 6px; background: white; border-radius: 50%; pointer-events: none; z-index: 999999; transform: translate(-50%, -50%); transition: transform 0.15s ease-out, background-color 0.2s; opacity: 0; }
        #cursor-ring { position: fixed; top: 0; left: 0; width: 36px; height: 36px; border: 1.5px solid rgba(79, 70, 229, 0.6); border-radius: 50%; pointer-events: none; z-index: 999998; transform: translate(-50%, -50%); transition: width 0.2s, height 0.2s, background-color 0.2s, border-color 0.2s; opacity: 0; }
        
        body.mouse-active #cursor-dot, body.mouse-active #cursor-ring { opacity: 1; }
        body.cursor-hover #cursor-ring { width: 56px; height: 56px; background-color: rgba(220, 38, 38, 0.1); border-color: rgba(220, 38, 38, 0.8); }
        body.cursor-hover #cursor-dot { transform: translate(-50%, -50%) scale(1.5); background: #10b981; }

        .gate-unlocked #auth-overlay { display: none !important; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 10%, 30%, 50%, 70%, 90% { transform: translateX(-6px); } 20%, 40%, 60%, 80% { transform: translateX(6px); } }
        .shake-element { animation: shake 0.4s ease-in-out; }

        @keyframes jelly-pop {
          0% { transform: scale(1) rotate(0deg); }
          40% { transform: scale(0.7) rotate(-15deg); }
          70% { transform: scale(1.15) rotate(15deg); }
          100% { transform: scale(1) rotate(0deg); }
        }
        .animate-jelly-pop { animation: jelly-pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .glass-card {
            background: rgba(17, 24, 39, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0b0f19; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }

        .check-container {
            display: flex;
            align-items: flex-start;
            margin-bottom: 0.5rem;
            cursor: pointer;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }
        .check-container:hover {
            background-color: rgba(30, 41, 59, 0.5);
            border-color: rgba(51, 65, 85, 0.5);
        }
        .check-container input[type="checkbox"] {
            position: absolute; opacity: 0; cursor: pointer; height: 0; width: 0;
        }
        .checkmark {
            margin-top: 0.2rem; height: 1.5rem; width: 1.5rem;
            background-color: rgba(15, 23, 42, 0.8);
            border: 2px solid #4b5563;
            border-radius: 0.375rem;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; transition: all 0.2s ease;
        }
        .check-container:hover input ~ .checkmark { border-color: #6b7280; }
        .check-container input:checked ~ .checkmark { background-color: #dc2626; border-color: #dc2626; box-shadow: 0 0 10px rgba(220, 38, 38, 0.5); }
        .checkmark:after {
            content: ""; display: none; width: 0.4rem; height: 0.8rem;
            border: solid white; border-width: 0 2px 2px 0;
            transform: rotate(45deg); margin-bottom: 0.15rem;
        }
        .check-container input:checked ~ .checkmark:after { display: block; }
        .check-text {
            margin-left: 1rem; color: #e2e8f0; font-size: 1.05rem;
            line-height: 1.5; font-weight: 500; transition: all 0.2s ease;
        }
        .check-container input:checked ~ .check-text {
            color: #64748b; text-decoration: line-through;
        }
        
        .nested-1 { margin-left: 2.5rem; }
        .nested-2 { margin-left: 5rem; }
        
        .accordion-content {
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease-in-out;
            max-height: 0; opacity: 0; overflow: hidden;
        }
        .accordion-content.open { max-height: 3500px; opacity: 1; }
        html { scroll-behavior: smooth; }

        @media print {
            body { background-color: white !important; color: black !important; }
            .no-print { display: none !important; }
            .no-print-section { display: none !important; }
            .accordion-content { max-height: none !important; opacity: 1 !important; display: block !important; padding: 1rem 0 !important; }
            .accordion-header i { display: none !important; }
            .accordion-header { break-after: avoid; background-color: #f1f5f9 !important; color: black !important; border: 1px solid #cbd5e1; }
            .glass-card { background: white !important; box-shadow: none !important; border: 1px solid #cbd5e1 !important; margin-bottom: 1rem !important; }
            .check-container { padding: 0.25rem 0 !important; margin-bottom: 0 !important; }
            .check-text { color: black !important; }
            input[type="text"], input[type="url"], .question-answer { border: none !important; padding: 0 !important; font-weight: bold; color: black !important; background: transparent !important; }
            .question-wrapper { margin-bottom: 0.5rem !important; border-bottom: 1px dashed #cbd5e1; }
            .question-wrapper a { display: none !important; }
            #gridCanvas { display: none !important; }
        }
    </style>
</head>
<body class="font-sans antialiased relative selection:bg-brand-crimson selection:text-white pb-20">

    <!-- CURSOR OVERLAYS -->
    <div id="mouseGlow"></div>
    <div id="cursor-dot"></div>
    <div id="cursor-ring"></div>

    <!-- CANVAS BACKGROUND -->
    <canvas id="gridCanvas" class="fixed inset-0 w-full h-full -z-10" style="pointer-events: none;"></canvas>

    <!-- SECURE GATE MODAL (Auth) -->
    <div id="auth-overlay" class="fixed inset-0 bg-black/95 backdrop-blur-md z-[100] flex flex-col items-center justify-center p-4 transition-opacity duration-300">
        <div id="gateModalBox" class="bg-[#0f0f1f] border border-brand-purple/30 rounded-2xl shadow-[0_0_40px_rgba(0,0,0,0.8)] w-[95%] sm:w-full max-w-md p-6 sm:p-8 text-center relative overflow-hidden">
            <div class="absolute -right-20 -top-20 w-48 h-48 bg-brand-purple/10 rounded-full blur-3xl pointer-events-none"></div>
            <img src="https://raw.githubusercontent.com/RemyTCHB/TCHB-INVESTOR-NETWORK-PORTAL/main/logo.svg" alt="TCHB Logo" class="h-16 sm:h-20 mx-auto mb-6 relative z-10 opacity-90" onerror="this.src='https://placehold.co/180x60/241a45/ffffff?text=TCHB+LOGO'">
            
            <div class="mx-auto w-14 h-14 rounded-full bg-brand-purple/10 flex items-center justify-center border border-brand-purple/20 mb-4 relative z-10" id="gateLockIconContainer">
                <svg id="gateLockIcon" class="w-6 h-6 text-brand-purple transition-all duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            
            <h2 class="text-xl font-bold text-white mb-2 relative z-10 uppercase tracking-widest">TC CHECKLIST</h2>
            <p class="text-gray-400 mb-6 font-medium text-xs relative z-10">Authorized Personnel Login Required</p>
            
            <button id="google-login-btn" onclick="window.signInWithGoogle()" class="w-full bg-white hover:bg-gray-100 text-gray-900 font-bold py-3 px-4 rounded-lg flex items-center justify-center transition-all shadow-[0_0_15px_rgba(255,255,255,0.1)] relative z-10 cursor-pointer">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5 mr-3" alt="Google">
                Sign in with Google
            </button>
            <p id="auth-error" class="text-brand-crimson text-xs font-semibold mt-4 hidden leading-relaxed relative z-10"></p>
        </div>
    </div>

    <!-- HEADER -->
    <header class="bg-[#0b0f19]/90 backdrop-blur-xl shadow-lg sticky top-0 md:top-2 z-50 border border-gray-800/80 md:rounded-2xl md:mx-4 md:mt-2 no-print transition-all duration-300">
        <div class="max-w-6xl mx-auto px-4 py-3 flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-4 w-full sm:w-auto justify-between sm:justify-start">
                <img src="https://raw.githubusercontent.com/RemyTCHB/TCHB-INVESTOR-NETWORK-PORTAL/main/logo.svg" alt="TCHB" class="h-10 object-contain drop-shadow-md">
                
                <div class="h-8 w-px bg-gray-700/80 shrink-0 hidden sm:block mx-2"></div>
                
                <h1 class="text-lg font-bold text-white tracking-widest uppercase hidden sm:block">TC Checklist</h1>

                <div class="h-8 w-px bg-gray-700/80 shrink-0 hidden sm:block mx-2"></div>

                <!-- Active Users Pill -->
                <div class="relative shrink-0">
                    <button onclick="window.toggleActiveUsers(event)" class="flex items-center gap-2 bg-gray-800/60 border border-gray-700/60 hover:bg-gray-700/60 rounded-lg px-3 h-9 cursor-pointer transition-colors shadow-sm">
                        <i class="fa-solid fa-users text-brand-emerald text-[10px]"></i>
                        <span class="text-[10px] font-bold text-gray-300 uppercase tracking-wider hidden md:inline">Active</span>
                        <span id="activeUserCountBtn" class="bg-brand-emerald/10 text-brand-emerald border border-brand-emerald/30 px-1.5 py-0.5 rounded text-[10px] font-black leading-none">0</span>
                    </button>
                    <div id="activeUsersDropdown" class="absolute left-0 sm:left-auto sm:right-0 top-full mt-3 w-48 bg-[#0f1423] border border-gray-700 rounded-xl shadow-[0_0_30px_rgba(16,185,129,0.15)] hidden flex-col z-[100] overflow-hidden text-left">
                        <div class="bg-gray-800/80 px-3 py-2 border-b border-gray-700 text-[10px] font-bold text-gray-400 uppercase tracking-wider flex justify-between items-center">
                            <span>Personnel Online</span>
                            <span id="activeUserCount" class="text-brand-emerald">0</span>
                        </div>
                        <div id="activeUsersList" class="flex flex-col max-h-48 overflow-y-auto p-1.5 gap-1 custom-scrollbar">
                            <!-- Populated by JS -->
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <div class="flex flex-col items-end mr-2">
                    <p class="text-xs font-bold text-brand-purple uppercase tracking-widest">TC First Call</p>
                    <div class="flex items-center mt-0.5">
                        <span class="flex h-2 w-2 relative mr-1.5" id="sync-ping">
                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-brand-emerald opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-2 w-2 bg-brand-emerald"></span>
                        </span>
                        <p class="text-[9px] font-bold text-gray-400 uppercase tracking-wider">Cloud Sync</p>
                    </div>
                </div>

                <button onclick="window.logOut()" class="flex items-center justify-center w-9 h-9 rounded-lg bg-gray-800/60 border border-gray-700/60 text-gray-400 hover:text-brand-crimson hover:bg-brand-crimson/10 hover:border-brand-crimson/30 transition-all cursor-pointer shadow-sm shrink-0" title="Sign Out">
                    <i class="fa-solid fa-arrow-right-from-bracket text-[12px]"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 sm:px-6 py-6 relative z-10">
        
        <!-- Property Context / Session Manager -->
        <div class="glass-card rounded-2xl border border-gray-800 p-5 sm:p-6 mb-8 relative overflow-hidden">
            <div class="absolute -right-20 -top-20 w-48 h-48 bg-brand-cyan/5 rounded-full blur-3xl pointer-events-none"></div>
            
            <div class="flex flex-col sm:flex-row justify-between sm:items-center gap-4 mb-5 relative z-10">
                <h2 class="text-lg font-bold text-white flex items-center tracking-wide">
                    <i class="fa-solid fa-map-pin mr-2 text-brand-emerald"></i> Property Context
                </h2>
                <div class="flex items-center gap-3 no-print">
                    <span id="save-status" class="text-[10px] font-bold uppercase tracking-wider px-2.5 py-1.5 bg-gray-800/50 border border-gray-700 text-gray-400 rounded transition-colors shadow-sm">Waiting for address...</span>
                    <button onclick="openManageModal()" class="text-[10px] font-bold uppercase tracking-wider px-3 py-1.5 bg-brand-purple/20 border border-brand-purple/50 text-brand-purple rounded hover:bg-brand-purple hover:text-white transition-colors flex items-center shadow-sm cursor-pointer">
                        <i class="fa-solid fa-cloud mr-1.5"></i> Load Cloud Save
                    </button>
                </div>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5 relative z-10">
                <div>
                    <label for="property-address" class="block text-[10px] font-bold uppercase tracking-wider text-gray-400 mb-1.5">Property Address</label>
                    <input type="text" id="property-address" list="saved-addresses" placeholder="e.g. 123 Main St, Miami FL..." class="w-full bg-gray-950/80 border border-gray-700 rounded-lg p-3 text-white focus:outline-none focus:border-brand-emerald focus:ring-1 focus:ring-brand-emerald transition-colors placeholder-gray-600 shadow-inner">
                    <datalist id="saved-addresses"></datalist>
                </div>
                <div>
                    <label for="crm-link" class="block text-[10px] font-bold uppercase tracking-wider text-gray-400 mb-1.5">CRM Lead Link</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fa-solid fa-link text-gray-500"></i>
                        </div>
                        <input type="url" id="crm-link" placeholder="https://app.gohighlevel.com/..." class="w-full bg-gray-950/80 border border-gray-700 rounded-lg pl-10 p-3 text-white focus:outline-none focus:border-brand-emerald focus:ring-1 focus:ring-brand-emerald transition-colors placeholder-gray-600 shadow-inner">
                    </div>
                </div>
            </div>
        </div>

        <!-- Controls Bar -->
        <div class="flex flex-wrap gap-3 mb-6 justify-end no-print relative z-10">
            <button onclick="window.printChecklist()" class="px-5 py-2.5 bg-gray-800 hover:bg-gray-700 border border-gray-700 text-white text-xs font-bold uppercase tracking-wider rounded-lg shadow-md transition-all flex items-center cursor-pointer">
                <i class="fa-solid fa-print mr-2 text-gray-400"></i>Print / PDF
            </button>
            <button onclick="toggleAll(true)" class="px-5 py-2.5 bg-gradient-to-r from-brand-emerald/10 to-brand-cyan/10 border border-brand-emerald/30 hover:border-brand-emerald/60 text-gray-200 hover:text-white text-xs font-bold uppercase tracking-wider rounded-lg shadow-md transition-all flex items-center cursor-pointer">
                <i class="fa-solid fa-folder-open mr-2 text-brand-emerald"></i>Expand All
            </button>
            <button onclick="toggleAll(false)" class="px-5 py-2.5 bg-gray-800 hover:bg-gray-700 border border-gray-700 text-gray-300 hover:text-white text-xs font-bold uppercase tracking-wider rounded-lg shadow-md transition-all flex items-center cursor-pointer">
                <i class="fa-solid fa-folder-closed mr-2 text-gray-400"></i>Collapse All
            </button>
            <button onclick="resetChecklist()" class="px-5 py-2.5 bg-gradient-to-r from-brand-crimson to-brand-purple text-white text-xs font-bold uppercase tracking-wider rounded-lg shadow-[0_0_15px_rgba(220,38,38,0.3)] hover:shadow-[0_0_25px_rgba(220,38,38,0.5)] transition-all flex items-center ml-0 sm:ml-2 cursor-pointer">
                <i class="fa-solid fa-rotate-right mr-2"></i>Reset Call
            </button>
        </div>

        <!-- Checklist Sections -->
        <div class="space-y-5 relative z-10" id="checklist-container">

            <!-- Mortgage Questions -->
            <div class="glass-card rounded-xl border border-gray-800 overflow-hidden group">
                <button class="accordion-header w-full px-6 py-5 flex justify-between items-center bg-gray-900/60 hover:bg-gray-800/80 transition-colors cursor-pointer border-b border-gray-800" onclick="toggleAccordion(this)">
                    <div class="flex items-center">
                        <div class="w-10 h-10 rounded-lg bg-brand-cyan/10 border border-brand-cyan/20 flex items-center justify-center mr-4 text-brand-cyan shadow-inner group-hover:shadow-[0_0_15px_rgba(6,182,212,0.3)] transition-all">
                            <i class="fa-solid fa-building-columns text-lg"></i>
                        </div>
                        <h2 class="text-sm font-bold text-white tracking-widest uppercase">Mortgage Questions</h2>
                    </div>
                    <i class="fa-solid fa-chevron-down text-gray-500 transform transition-transform duration-300 group-hover:text-brand-cyan"></i>
                </button>
                <div class="accordion-content open bg-gray-900/20 px-6 py-5">
                    <label class="check-container">
                        <input type="checkbox" class="checklist-cb">
                        <span class="checkmark"></span>
                        <span class="check-text">Mtg Company ?</span>
                    </label>
                    <label class="check-container">
                        <input type="checkbox" class="checklist-cb">
                        <span class="checkmark"></span>
                        <span class="check-text">Total Principle Owed / Total Payoff ?</span>
                    </label>
                    <label class="check-container">
                        <input type="checkbox" class="checklist-cb">
                        <span class="checkmark"></span>
                        <span class="check-text">Is Property In Pre Foreclosure? Any Red Flags Like This ?</span>
                    </label>
                    <label class="check-container">
                        <input type="checkbox" class="checklist-cb">
                        <span class="checkmark"></span>
                        <span class="check-text">Was There Any Late Payments?</span>
                    </label>
                </div>
            </div>

            <!-- Pictures -->
            <div class="glass-card rounded-xl border border-gray-800 overflow-hidden group">
                <button class="accordion-header w-full px-6 py-5 flex justify-between items-center bg-gray-900/60 hover:bg-gray-800/80 transition-colors cursor-pointer border-b border-gray-800" onclick="toggleAccordion(this)">
                    <div class="flex items-center">
                        <div class="w-10 h-10 rounded-lg bg-brand-purple/10 border border-brand-purple/20 flex items-center justify-center mr-4 text-brand-purple shadow-inner group-hover:shadow-[0_0_15px_rgba(79,70,229,0.3)] transition-all">
                            <i class="fa-solid fa-camera text-lg"></i>
                        </div>
                        <h2 class="text-sm font-bold text-white tracking-widest uppercase">Pictures</h2>
                    </div>
                    <i class="fa-solid fa-chevron-down text-gray-500 transform transition-transform duration-300 group-hover:text-brand-purple"></i>
                </button>
                <div class="accordion-content bg-gray-900/20 px-6 py-5">
                    <label class="check-container">
                        <input type="checkbox" class="checklist-cb">
                        <span class="checkmark"></span>
                        <span class="check-text">Sending Photos Any Current Photos From Seller ?</span>
                    </label>
                </div>
            </div>

            <!-- Emergency Contact Info -->
            <div class="glass-card rounded-xl border border-gray-800 overflow-hidden group">
                <button class="accordion-header w-full px-6 py-5 flex justify-between items-center bg-gray-900/60 hover:bg-gray-800/80 transition-colors cursor-pointer border-b border-gray-800" onclick="toggleAccordion(this)">
                    <div class="flex items-center">
                        <div class="w-10 h-10 rounded-lg bg-brand-emerald/10 border border-brand-emerald/20 flex items-center justify-center mr-4 text-brand-emerald shadow-inner group-hover:shadow-[0_0_15px_rgba(16,185,129,0.3)] transition-all">
                            <i class="fa-solid fa-address-book text-lg"></i>
                        </div>
                        <h2 class="text-sm font-bold text-white tracking-widest uppercase">Emergency Contact Info</h2>
                    </div>
                    <i class="fa-solid fa-chevron-down text-gray-500 transform transition-transform duration-300 group-hover:text-brand-emerald"></i>
                </button>
                <div class="accordion-content bg-gray-900/20 px-6 py-5">
                    <label class="check-container">
                        <input type="checkbox" class="checklist-cb">
                        <span class="checkmark"></span>
                        <span class="check-text">Who Is The Emergency Contact? Best Phone Number/ Best Way To Communicate With This Person? ( Call Or Text, Etc.)</span>
                    </label>
                </div>
            </div>

            <!-- HOA Questions -->
            <div class="glass-card rounded-xl border border-gray-800 overflow-hidden group">

        // --- STREAMING_CHUNK:Canvas Background Animation ---
        const canvas = document.getElementById('gridCanvas');
        const ctx = canvas.getContext('2d');
        let gridSize = 55; let sparks = []; let lastSpanSpawn = 0; let lastInteractionTime = Date.now(); 
        const brandColors = [{ r: 79, g: 70, b: 229 }, { r: 220, g: 38, b: 38 }, { r: 16, g: 185, b: 129 }];

        let customMouseX = window.innerWidth / 2; let customMouseY = window.innerHeight / 2;
        let ringX = customMouseX; let ringY = customMouseY;

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas);

        function createSpark(x = null, y = null, isClick = false) {
            const isHorizontal = Math.random() > 0.5;
            let startX, startY, dirX, dirY;
            if (isClick && x !== null && y !== null) {
                startX = Math.round(x / gridSize) * gridSize; startY = Math.round(y / gridSize) * gridSize;
                dirX = isHorizontal ? (Math.random() > 0.5 ? 1 : -1) : 0; dirY = isHorizontal ? 0 : (Math.random() > 0.5 ? 1 : -1);
            } else {
                if (isHorizontal) {
                    startX = Math.random() < 0.5 ? 0 : canvas.width; startY = Math.floor(Math.random() * (canvas.height / gridSize)) * gridSize;
                    dirX = startX === 0 ? 1 : -1; dirY = 0;
                } else {
                    startX = Math.floor(Math.random() * (canvas.width / gridSize)) * gridSize; startY = Math.random() < 0.5 ? 0 : canvas.height;
                    dirX = 0; dirY = startY === 0 ? 1 : -1;
                }
            }
            const color = brandColors[Math.floor(Math.random() * brandColors.length)];
            sparks.push({ startX, startY, targetX: startX + dirX * gridSize, targetY: startY + dirY * gridSize, dirX, dirY, progress: 0, speed: 0.02 + Math.random() * 0.03, life: 1, decay: 0.005 + Math.random() * 0.01, history: [], color: color });
        }

        document.addEventListener('mousedown', (e) => { 
            lastInteractionTime = Date.now();
            for(let i=0; i<3; i++) createSpark(e.clientX, e.clientY, true); 
            const ring = document.getElementById('cursor-ring');
            if(ring) { ring.style.transform = `translate(-50%, -50%) scale(0.7)`; setTimeout(() => ring.style.transform = `translate(-50%, -50%) scale(1)`, 150); }
        });

        document.addEventListener('mousemove', (e) => {
            document.body.classList.add('mouse-active');
            customMouseX = e.clientX; customMouseY = e.clientY;
            const dot = document.getElementById('cursor-dot');
            if(dot) { dot.style.left = `${customMouseX}px`; dot.style.top = `${customMouseY}px`; }
            const glow = document.getElementById('mouseGlow');
            if(glow) {
                glow.style.setProperty('--mouse-x', `${e.clientX}px`); glow.style.setProperty('--mouse-y', `${e.clientY}px`);
                if (glow.style.opacity === '0' || glow.style.opacity === '') glow.style.opacity = '1';
            }
        });

        document.addEventListener('mouseover', (e) => {
            if (e.target.closest('a, button, input, textarea, select, [onclick], .cursor-pointer, label')) { 
                document.body.classList.add('cursor-hover'); 
            } else { 
                document.body.classList.remove('cursor-hover'); 
            }
        });

        document.addEventListener('mouseleave', () => { const glow = document.getElementById('mouseGlow'); if(glow) glow.style.opacity = '0'; });

        function drawSparks() {
            ctx.lineCap = 'round';
            sparks.forEach(spark => {
                const c = spark.color;
                ctx.beginPath(); ctx.moveTo(spark.startX, spark.startY);
                ctx.lineTo(spark.startX + (spark.targetX - spark.startX) * spark.progress, spark.startY + (spark.targetY - spark.startY) * spark.progress);
                ctx.strokeStyle = `rgba(${c.r}, ${c.g}, ${c.b}, ${spark.life})`; ctx.lineWidth = 2; ctx.stroke();
                spark.history.forEach((point, index) => {
                    ctx.beginPath(); ctx.moveTo(point.x, point.y); ctx.lineTo(point.nextX, point.nextY);
                    ctx.strokeStyle = `rgba(${c.r}, ${c.g}, ${c.b}, ${spark.life * (index / spark.history.length) * 0.5})`;
                    ctx.lineWidth = 2 * (index / spark.history.length); ctx.stroke();
                });
                ctx.shadowColor = `rgb(${c.r}, ${c.g}, ${c.b})`; ctx.shadowBlur = 10; ctx.beginPath();
                const currentX = spark.startX + (spark.targetX - spark.startX) * spark.progress; const currentY = spark.startY + (spark.targetY - spark.startY) * spark.progress;
                ctx.arc(currentX, currentY, 1.5, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${Math.min(c.r+40,255)}, ${Math.min(c.g+40,255)}, ${Math.min(c.b+40,255)}, ${spark.life})`; ctx.fill(); ctx.shadowBlur = 0;
            });
        }

        function animateGrid(timestamp) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(79, 70, 229, 0.07)'; ctx.lineWidth = 1; ctx.beginPath();
            for (let x = 0; x < canvas.width; x += gridSize) { ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); }
            for (let y = 0; y < canvas.height; y += gridSize) { ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); }
            ctx.stroke();

            ringX += (customMouseX - ringX) * 0.15; ringY += (customMouseY - ringY) * 0.15;
            const ring = document.getElementById('cursor-ring');
            if (ring) { ring.style.left = `${ringX}px`; ring.style.top = `${ringY}px`; }

            drawSparks();
            
            if (Date.now() - lastInteractionTime > 5000 && timestamp - lastSpanSpawn > 500 && sparks.length < 32) { createSpark(); lastSpanSpawn = timestamp; }

            for (let i = sparks.length - 1; i >= 0; i--) {
                let spark = sparks[i]; spark.progress += spark.speed; spark.life -= spark.decay;
                if (spark.history.length > 5) spark.history.shift();
                spark.history.push({ x: spark.startX + (spark.targetX - spark.startX) * spark.progress, y: spark.startY + (spark.targetY - spark.startY) * spark.progress, nextX: spark.startX + (spark.targetX - spark.startX) * (spark.progress + 0.1), nextY: spark.startY + (spark.targetY - spark.startY) * (spark.progress + 0.1) });
                if (spark.life <= 0) { sparks.splice(i, 1); } 
                else if (spark.progress >= 1) {
                    spark.startX = spark.targetX; spark.startY = spark.targetY; spark.progress = 0;
                    if (Math.random() < 0.3 && sparks.length < 32) {
                        let isHorizontal = spark.dirX !== 0; let branchDirX = isHorizontal ? 0 : (Math.random() > 0.5 ? 1 : -1); let branchDirY = isHorizontal ? (Math.random() > 0.5 ? 1 : -1) : 0;
                        sparks.push({ startX: spark.startX, startY: spark.startY, targetX: spark.startX + branchDirX * gridSize, targetY: spark.startY + branchDirY * gridSize, dirX: branchDirX, dirY: branchDirY, progress: 0, speed: spark.speed, life: spark.life * 0.75, decay: spark.decay, history: [], color: spark.color });
                    }
                    spark.targetX = spark.startX + spark.dirX * gridSize; spark.targetY = spark.startY + spark.dirY * gridSize;
                }
            }
            requestAnimationFrame(animateGrid);
        }

        resizeCanvas(); requestAnimationFrame(animateGrid);

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service_worker.js')
                    .then(registration => {
                        console.log('PWA ServiceWorker registered successfully with scope: ', registration.scope);
                    })
                    .catch(err => {
                        console.error('PWA ServiceWorker registration failed: ', err);
                    });
            });
        }
    </script>
</body>
</html>
